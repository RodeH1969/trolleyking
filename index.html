<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>TrolleyKing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="icon" href="./assets/trolley.png">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="screen screen--intro" id="screen-intro">
        <div class="intro-top">
          <img
            src="./assets/trolleykinglogo.png"
            alt="TrolleyKing"
            class="intro-logo"
            decoding="async"
            fetchpriority="high"
          >
        </div>

        <div class="intro-middle">
          <h1 class="intro-title">
            How many products<br>
            can you fit in your<br>
            trolley?
          </h1>

          <button id="btn-play" class="play-button" type="button">Play</button>
        </div>

        <div class="intro-bottom">
          <div class="date-line" id="intro-date">April 29, 2026</div>
          <div class="meta-line">No. 12</div>
          <div class="meta-line">Edited by Rodey Harding</div>
        </div>
      </section>

      <section class="screen screen--how hidden" id="screen-how">
        <div class="how-top">
          <h2 class="how-title">How to play</h2>
          <p class="how-copy">
            5 products. How many can you guess the price correctly and get in your trolley.
          </p>
        </div>

        <div class="how-middle">
          <div class="answer-row">
            <div class="answer-box">
              <span class="answer-text">$9.90</span>
            </div>
            <img
              src="./assets/tick.png"
              alt="Correct"
              class="answer-icon"
              decoding="async"
            >
          </div>

          <div class="product-hero product-hero--how">
            <img
              src="./assets/woolworths-vegemite-560g.png"
              alt="Vegemite 560g"
              class="product-image product-image--how"
              decoding="async"
              fetchpriority="high"
            >
          </div>

          <div class="product-name product-name--how">Vegemite 560g</div>
          <div class="product-store">Woolworths</div>
        </div>

        <div class="how-bottom">
          <button id="btn-how-start" class="action-button" type="button">ENTER</button>
        </div>
      </section>

      <section class="screen screen--round hidden" id="screen-round">
        <div class="round-top">
          <div class="answer-row">
            <div class="answer-box">
              <span class="answer-text" id="answer-text"></span>
            </div>
            <img
              id="answer-icon"
              src=""
              alt=""
              class="answer-icon hidden"
              decoding="async"
            >
          </div>
        </div>

        <div class="round-middle">
          <div class="product-hero">
            <img
              id="product-image"
              alt=""
              class="product-image"
              decoding="async"
              fetchpriority="high"
            >
            <img
              id="special-badge"
              src="./assets/Special.png"
              alt="Special"
              class="special-badge hidden"
              decoding="async"
            >
          </div>

          <div class="product-name" id="product-name"></div>
          <div class="product-store" id="product-store"></div>

          <div class="price-grid" id="price-grid"></div>
        </div>

        <div class="round-bottom">
          <div class="trolley-wrap">
            <img
              src="./assets/trolley.png"
              alt="Trolley"
              class="trolley-image"
              decoding="async"
            >
            <img
              id="trolley-count-image"
              src=""
              alt=""
              class="trolley-count-image hidden"
              decoding="async"
            >
          </div>

          <button id="btn-round-action" class="action-button" type="button">ENTER</button>
        </div>
      </section>

      <section class="screen screen--share hidden" id="screen-share">
        <div class="share-date" id="share-date">April 29, 2026</div>

        <div class="share-trolley">
          <img
            src="./assets/trolley.png"
            alt="Trolley"
            class="trolley-image trolley-image--share"
            decoding="async"
          >
          <img
            id="share-trolley-count-image"
            src=""
            alt=""
            class="trolley-count-image trolley-count-image--share hidden"
            decoding="async"
          >
        </div>

        <button id="btn-share" class="action-button" type="button">SHARE</button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
